<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniBrain | 智能企业制度中心</title>
    <!-- 引入 Outfit 字体提升高级感 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><span>🧠</span> UniBrain</h2>
                <button id="theme-toggle" title="切换主题">
                    <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
                </button>
            </div>
            
            <button id="new-chat-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                开启新对话
            </button>

            <div class="conv-list-section">
                <h3>历史会话</h3>
                <ul id="conv-list"></ul>
            </div>
            
            <div class="doc-list-section">
                <h3>制度库文档</h3>
                <ul id="doc-list"></ul>
            </div>

            <div class="upload-section">
                <div id="drop-zone" class="drop-zone">
                    <span class="upload-icon">✦</span>
                    <p>上传新制度</p>
                    <p class="sub-text">拖拽 PDF 或 Word 文件</p>
                    <input type="file" id="file-input" accept=".pdf,.doc,.docx,.txt" />
                </div>
                <div id="upload-status" class="upload-status hidden">
                    <div class="spinner"></div>
                    <span>处理中...</span>
                </div>
            </div>
        </aside>

        <!-- Main Chat -->
        <main class="chat-area">
            <header class="chat-header">
                <div class="chat-title">
                    <span class="ai-icon">✨</span>
                    <h2>智能助手</h2>
                </div>
                <div class="status-indicator">
                    <span class="dot"></span> 系统在线
                </div>
            </header>

            <div id="chat-messages" class="chat-messages">
                <!-- Messages dynamic -->
            </div>

            <div class="input-area">
                <form id="chat-form">
                    <input type="text" id="chat-input" placeholder="请问关于公司制度，有什么可以帮您的？" autocomplete="off"/>
                    <button type="submit" id="send-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                    </button>
                </form>
            </div>
        </main>
    </div>
    <!-- 文件预览 Modal -->
    <div id="preview-modal" class="modal-overlay">
        <div class="modal-content">
            <header class="modal-header">
                <h3 id="preview-filename">正在预览文件</h3>
                <button class="modal-close" onclick="closePreview()">&times;</button>
            </header>
            <div class="modal-body">
                <iframe id="preview-frame" src=""></iframe>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
